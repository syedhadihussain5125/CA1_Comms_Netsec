<!--
  ossec-manager.conf  —  Wazuh Manager Configuration
  Larkspur Retail Group  |  Student: Syed Hadi Hussain  |  CA1
  Deploy at: /var/ossec/etc/ossec.conf  on the wazuh-manager VM

  This configuration includes:
    - Agent listener on port 1514/1515
    - Active response: firewall-drop, account-lock, remove-task
    - Alert log paths
    - Email/Syslog disabled (lab environment)
-->

<ossec_config>

  <!-- ============================================================
    GLOBAL SETTINGS
  ============================================================ -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@larkspur.lab</email_from>
    <email_to>soc@larkspur.lab</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ============================================================
    ALERTS — minimum level to log / forward
  ============================================================ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ============================================================
    REMOTE — receive events from agents on 1514 (encrypted)
  ============================================================ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ============================================================
    AUTHD — allow lab agents to enrol on TCP 1515 using a shared
    registration password stored at /var/ossec/etc/authd.pass.
  ============================================================ -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <force_insert>yes</force_insert>
    <purge>yes</purge>
    <use_password>yes</use_password>
  </auth>

  <!-- ============================================================
    RULESET — load default rules + our custom local_rules.xml
  ============================================================ -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <user_rules_dir>etc/rules</user_rules_dir>
  </ruleset>

  <!-- ============================================================
    ACTIVE RESPONSE COMMAND DEFINITIONS
    Scripts must reside in:  /var/ossec/active-response/bin/
    (Linux AR) or  C:\...\ossec-agent\active-response\bin\  (Windows AR)
  ============================================================ -->

  <!-- 1. firewall-drop  — blocks source IP via iptables on Linux endpoint -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- 2. account-lock  — locks a Linux user account with usermod -L -->
  <command>
    <name>account-lock</name>
    <executable>account-lock.sh</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <!-- 3. remove-task  — deletes a Windows scheduled task (CMD wrapper) -->
  <command>
    <name>remove-task</name>
    <executable>remove-task.cmd</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <!-- ============================================================
    ACTIVE RESPONSE TRIGGERS
    Each <active-response> block binds a command to one or more rules.
    location=local  → run on the agent that generated the alert
    location=server → run on the manager
  ============================================================ -->

  <!-- AR-1: Block attacker IP for 60 seconds on SSH brute force -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>105760</rules_id>
    <timeout>60</timeout>
  </active-response>

  <!-- AR-2: Lock account when sudo escalation after creation is detected -->
  <active-response>
    <command>account-lock</command>
    <location>local</location>
    <rules_id>100011</rules_id>
    <timeout>0</timeout>
  </active-response>

  <!-- AR-3: Delete suspicious scheduled task on Windows endpoint -->
  <active-response>
    <command>remove-task</command>
    <location>local</location>
    <rules_id>100600</rules_id>
    <timeout>0</timeout>
  </active-response>

  <!-- ============================================================
    LOCALFILE — monitor manager's own logs
  ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- ============================================================
    VULNERABILITY DETECTION (optional — requires Wazuh 4.x)
  ============================================================ -->
  <vulnerability-detection>
    <enabled>no</enabled>
  </vulnerability-detection>

  <!-- ============================================================
    CLUSTER (single-node lab — disabled)
  ============================================================ -->
  <cluster>
    <name>wazuh</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>larkspur-lab-cluster-key-001</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>192.168.56.10</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

</ossec_config>
