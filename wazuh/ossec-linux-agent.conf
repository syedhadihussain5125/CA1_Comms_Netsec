<!--
  ossec-linux-agent.conf  —  Wazuh Agent Config  (Linux Endpoint)
  Larkspur Retail Group  |  Student: Batool Fatima  |  CA1
  Deploy at: /var/ossec/etc/ossec.conf  on the linux-endpoint VM (192.168.56.30)

  Telemetry sources:
    - /var/log/auth.log     SSH events, sudo, PAM, useradd
    - /var/log/syslog       System events
    - auditd                execve, user-add, sudoers changes (via audisp-syslog or direct)
    - journald              Process execution and service events
-->

<ossec_config>

  <!-- ============================================================
    CLIENT — point agent at the manager
  ============================================================ -->
  <client>
    <server>
      <address>192.168.56.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ============================================================
    CLIENT BUFFER
  ============================================================ -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ============================================================
    LOCALFILE — LOG SOURCES
    All sources that provide evidence for Part B and Part C detections.
  ============================================================ -->

  <!-- Primary: SSH, sudo, PAM, useradd — feeds rules 100010, 100011, 105760 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- System-level syslog -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- auditd syscall log — advanced source for process execution evidence -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- journald — process execution and system events -->
  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- Dpkg log for package installation events -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- ============================================================
    ACTIVE RESPONSE — agent must accept AR commands from manager
    The firewall-drop and account-lock scripts are triggered here.
  ============================================================ -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ============================================================
    ROOTCHECK — basic rootkit detection
  ============================================================ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- ============================================================
    SCA — Security Configuration Assessment
  ============================================================ -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ============================================================
    SYSCHECK — File Integrity Monitoring
    Watches key system files for the lab scenario.
  ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Integrity monitoring on /etc/passwd, /etc/shadow, /etc/sudoers -->
    <directories realtime="yes" check_all="yes">/etc/passwd,/etc/shadow,/etc/sudoers,/etc/sudoers.d</directories>
    <directories check_all="yes">/bin,/sbin,/usr/bin</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <nodiff>/etc/ssl/private.key</nodiff>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- ============================================================
    LOGGING
  ============================================================ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
