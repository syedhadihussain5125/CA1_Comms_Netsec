<!--
  ossec-windows-agent.conf  —  Wazuh Agent Config  (Windows Endpoint)
  Larkspur Retail Group  |  Student: Batool Fatima  |  CA1
  Deploy at: C:\Program Files (x86)\ossec-agent\ossec.conf  on windows-endpoint (192.168.56.20)

  Telemetry sources:
    - Security Event Log    EID 4624/4625 logon, EID 4672 privileges,
                            EID 4688 process creation, EID 4698/4702 task
                            EID 4720 account creation
    - Sysmon (EID 1,3,11)   process creation, network, file events
    - PowerShell/Operational Script-block and module logging
-->

<ossec_config>

  <!-- ============================================================
    CLIENT — point agent at the manager
  ============================================================ -->
  <client>
    <server>
      <address>192.168.56.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows10</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ============================================================
    CLIENT BUFFER
  ============================================================ -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ============================================================
    LOCALFILE — WINDOWS EVENT LOG SOURCES
    Targeted event IDs only — reduces noise while keeping all
    evidence needed for CA1 detections.
  ============================================================ -->

  <!-- Security Event Log: Logon/logoff, process creation, task, account -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
    <query>
      <![CDATA[
        <QueryList>
          <Query Id="0" Path="Security">
            <Select Path="Security">
              *[System[(EventID=4624 or EventID=4625 or EventID=4648 or
                         EventID=4672 or EventID=4688 or EventID=4698 or
                         EventID=4702 or EventID=4720 or EventID=4726 or
                         EventID=4756 or EventID=4732)]]
            </Select>
          </Query>
        </QueryList>
      ]]>
    </query>
  </localfile>

  <!-- Sysmon Event Log: Process creation, network, file, registry -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <query>
      <![CDATA[
        <QueryList>
          <Query Id="0" Path="Microsoft-Windows-Sysmon/Operational">
            <Select Path="Microsoft-Windows-Sysmon/Operational">
              *[System[(EventID=1 or EventID=3 or EventID=7 or EventID=11 or
                         EventID=12 or EventID=13 or EventID=17 or EventID=18 or
                         EventID=22 or EventID=23 or EventID=25)]]
            </Select>
          </Query>
        </QueryList>
      ]]>
    </query>
  </localfile>

  <!-- PowerShell Script Block Logging (EID 4104) -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <query>
      <![CDATA[
        <QueryList>
          <Query Id="0" Path="Microsoft-Windows-PowerShell/Operational">
            <Select Path="Microsoft-Windows-PowerShell/Operational">
              *[System[(EventID=4103 or EventID=4104)]]
            </Select>
          </Query>
        </QueryList>
      ]]>
    </query>
  </localfile>

  <!-- Windows System log for service events -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
    <query>
      <![CDATA[
        <QueryList>
          <Query Id="0" Path="System">
            <Select Path="System">
              *[System[(Level=1 or Level=2 or Level=3)]]
            </Select>
          </Query>
        </QueryList>
      ]]>
    </query>
  </localfile>

  <!-- ============================================================
    ACTIVE RESPONSE — allow manager to push remediation commands
  ============================================================ -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ============================================================
    ROOTCHECK — Windows-specific checks
  ============================================================ -->
  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
    <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
  </rootcheck>

  <!-- ============================================================
    SYSCHECK — File Integrity Monitoring (Windows)
  ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor sensitive Windows directories -->
    <directories realtime="yes" check_all="yes">%WINDIR%\System32\drivers\etc</directories>
    <directories realtime="yes" check_all="yes">%WINDIR%\System32\Tasks</directories>
    <directories check_all="yes">%PROGRAMFILES%</directories>

    <ignore>%WINDIR%\SoftwareDistribution</ignore>
    <ignore>%WINDIR%\Prefetch</ignore>
  </syscheck>

  <!-- ============================================================
    LOGGING
  ============================================================ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
