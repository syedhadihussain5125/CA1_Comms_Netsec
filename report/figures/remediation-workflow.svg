<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3: Detection-to-remediation workflow</title>
  <desc id="desc">Simulated attacker activity creates endpoint telemetry, Wazuh detections trigger allowlisted active-response scripts, and verification confirms containment.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .stage { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 9; }
      .detect { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 9; }
      .respond { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 9; }
      .verify { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 9; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .text { font: 12.5px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="45" y="52" class="title">Detection-to-Remediation Workflow</text>

  <rect x="55" y="110" width="190" height="100" class="stage"/>
  <text x="88" y="144" class="label">Simulation</text>
  <text x="88" y="170" class="text">Benign ATT&amp;CK signal</text>
  <text x="88" y="192" class="text">No malware used</text>

  <rect x="310" y="110" width="190" height="100" class="stage"/>
  <text x="350" y="144" class="label">Telemetry</text>
  <text x="350" y="170" class="text">Sysmon, Security Log</text>
  <text x="350" y="192" class="text">auth.log, auditd</text>

  <rect x="565" y="110" width="190" height="100" class="detect"/>
  <text x="598" y="144" class="label">Detection</text>
  <text x="598" y="170" class="text">Custom Wazuh rules</text>
  <text x="598" y="192" class="text">MITRE mapped</text>

  <rect x="820" y="110" width="210" height="100" class="respond"/>
  <text x="858" y="144" class="label">Active Response</text>
  <text x="858" y="170" class="text">Allowlisted scripts only</text>
  <text x="858" y="192" class="text">Audited in logs</text>

  <path d="M245,160 L310,160" class="arrow"/>
  <path d="M500,160 L565,160" class="arrow"/>
  <path d="M755,160 L820,160" class="arrow"/>

  <rect x="95" y="300" width="250" height="110" class="verify"/>
  <text x="123" y="332" class="label">Rule 105760</text>
  <text x="123" y="358" class="text">SSH brute force triggers firewall-drop.sh</text>
  <text x="123" y="382" class="text">Verify: iptables DROP, auto-timeout</text>

  <rect x="425" y="300" width="250" height="110" class="verify"/>
  <text x="453" y="332" class="label">Rule 100011</text>
  <text x="453" y="358" class="text">New sudo account triggers account-lock.sh</text>
  <text x="453" y="382" class="text">Verify: passwd -S shows locked</text>

  <rect x="755" y="300" width="250" height="110" class="verify"/>
  <text x="783" y="332" class="label">Rule 100600</text>
  <text x="783" y="358" class="text">Suspicious task triggers remove-task.ps1</text>
  <text x="783" y="382" class="text">Verify: schtasks query fails</text>

  <path d="M925,210 C925,250 220,250 220,300" class="arrow"/>
  <path d="M925,210 C925,250 550,250 550,300" class="arrow"/>
  <path d="M925,210 C925,250 880,250 880,300" class="arrow"/>
</svg>
