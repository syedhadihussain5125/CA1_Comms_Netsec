<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Figure 1: High-level lab architecture and trust boundaries</title>
  <desc id="desc">Three virtual machines on an isolated host-only network: Windows endpoint, Linux endpoint, and Wazuh SIEM with Docker AI stack.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .siem { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 10; }
      .ai { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .weak { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .text { font: 13px Arial, sans-serif; fill: #374151; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .boundary { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; rx: 18; }
    </style>
  </defs>

  <rect x="25" y="25" width="1050" height="570" class="boundary"/>
  <text x="55" y="62" class="title">VirtualBox Host-Only Lab Network: 192.168.56.0/24</text>
  <text x="55" y="88" class="small">No public inbound exposure. NAT is used only for controlled package installation during setup.</text>

  <rect x="75" y="140" width="275" height="175" class="box"/>
  <text x="100" y="174" class="label">Windows Endpoint</text>
  <text x="100" y="200" class="text">windows-endpoint</text>
  <text x="100" y="222" class="text">Windows 10 Enterprise</text>
  <text x="100" y="244" class="text">192.168.56.20</text>
  <text x="100" y="272" class="small">Security Log, Sysmon, PowerShell</text>
  <text x="100" y="294" class="small">Wazuh agent + remove-task AR</text>

  <rect x="75" y="375" width="275" height="155" class="box"/>
  <text x="100" y="409" class="label">Linux Endpoint</text>
  <text x="100" y="435" class="text">linux-endpoint</text>
  <text x="100" y="457" class="text">Ubuntu 22.04 LTS</text>
  <text x="100" y="479" class="text">192.168.56.30</text>
  <text x="100" y="507" class="small">auth.log, auditd, journald</text>

  <rect x="460" y="125" width="560" height="300" class="siem"/>
  <text x="490" y="160" class="label">SIEM and Automation Host</text>
  <text x="490" y="186" class="text">wazuh-manager | Ubuntu 22.04 LTS | 192.168.56.10</text>
  <text x="490" y="213" class="small">Wazuh Manager receives encrypted agent telemetry on TCP 1514</text>
  <text x="490" y="235" class="small">Wazuh Authd enrols agents on TCP 1515 using authd.pass</text>
  <text x="490" y="257" class="small">Wazuh Indexer stores parsed alerts and events</text>
  <text x="490" y="279" class="small">Wazuh Dashboard provides triage, search, and visualisation</text>

  <rect x="500" y="315" width="220" height="75" class="ai"/>
  <text x="520" y="343" class="label">Ollama LLM</text>
  <text x="520" y="368" class="small">llama3.2:1b, Docker network only</text>

  <rect x="755" y="315" width="225" height="75" class="ai"/>
  <text x="775" y="343" class="label">Streamlit SOC UI</text>
  <text x="775" y="368" class="small">Reads alerts.json read-only</text>

  <rect x="460" y="465" width="560" height="65" class="weak"/>
  <text x="490" y="493" class="label">Controlled Weakness Boundary</text>
  <text x="490" y="516" class="small">Weak passwords, SSH password auth, and disabled Defender exist only inside this private lab.</text>

  <path d="M350,215 C395,215 410,215 455,215" class="arrow"/>
  <text x="365" y="203" class="small">TCP 1514</text>
  <path d="M350,452 C395,452 410,365 455,330" class="arrow"/>
  <text x="365" y="430" class="small">TCP 1514</text>
  <path d="M720,352 L755,352" class="arrow"/>
  <text x="700" y="300" class="small">AI summaries only</text>
</svg>
